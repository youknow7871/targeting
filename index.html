<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CRM Campaign Architect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="background-glow"></div>
    
    <header>
        <div class="logo">
            <span class="logo-icon">✨</span>
            <h1>CRM Architect <span class="badge">AI PRO</span></h1>
        </div>
        <div class="status-bar">
            <span class="status-dot"></span>
            <span id="data-status">Historical Data Loaded: 50 Campaigns</span>
        </div>
    </header>

    <main>
        <section class="planner-section">
            <div class="glass-card planner-card">
                <h2>캠페인 파라미터 설정</h2>
                <p class="subtitle">설정된 조건에 맞춰 과거 고성과 데이터 기반의 커스텀 문구를 생성합니다.</p>
                
                <form id="planner-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>발송 시점</label>
                            <select id="send-day" required>
                                <option value="weekday">주중 (월-금)</option>
                                <option value="weekend">주말 (토-일)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>발송 시간대</label>
                            <select id="send-time" required>
                                <option value="morning">오전 (09:00 - 12:00)</option>
                                <option value="afternoon">오후 (12:00 - 18:00)</option>
                                <option value="evening" selected>저녁 (18:00 - 22:00)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>고객 세그먼트</label>
                            <select id="customer-segment" required>
                                <!-- Dynamically populated -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>발송 매체</label>
                            <select id="medium" required>
                                <!-- Dynamically populated -->
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group full-width">
                        <label>발송 목적 (Info)</label>
                        <div class="input-with-indicator">
                            <input type="text" id="campaign-purpose" placeholder="예: 쿠폰 안내, 상품 소개, 타임특가 등" required>
                            <div id="relevance-score" class="relevance-badge" style="display:none;">
                                <span class="score-label">AI Relevance: </span>
                                <span class="score-value">0%</span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" id="generate-btn">
                        <span>AI 추천 생성하기</span>
                        <div class="loader-inner" style="display:none;"></div>
                    </button>
                </form>
            </div>
        </section>

        <section class="results-section" id="results-area" style="display:none;">
            <div class="section-header">
                <h2>추천 결과 및 예측 성과</h2>
                <div class="keyword-cloud" id="keyword-cloud">
                    <!-- 유의미한 키워드들이 여기에 렌더링됨 -->
                </div>
            </div>

            <div class="recommendations-grid" id="recommendations-container">
                <!-- 추천 카드들이 여기에 렌더링됨 -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 CRM AI Campaign Architect. Powered by Historical Success Data.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
